<body>
  <div class="empty" id="empty">
    <h1 class="empty-title">最小手順で画像に注釈してコピー</h1>
    <ol class="empty-steps">
      <li><b>1</b>画像をペースト（ドラッグ&ドロップでも可）</li>
      <li><b>2</b>マウスドラッグで矩形を描画</li>
      <li><b>3</b>ダブルクリックでテキスト挿入</li>
      <li><b>4</b><kbd data-other="Ctrl+C">⌘C</kbd> でクリップボードへコピー → Slack 等に貼り付け</li>
    </ol>
  </div>

  <div class="toolbar hidden" id="toolbar">
    <div class="t-group">
      <button class="swatch" data-color="#ff3b30" style="background:#ff3b30" title="red"></button>
      <button class="swatch" data-color="#ffcc00" style="background:#ffcc00" title="yellow"></button>
      <button class="swatch" data-color="#34c759" style="background:#34c759" title="green"></button>
      <button class="swatch" data-color="#0a84ff" style="background:#0a84ff" title="blue"></button>
      <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="white"></button>
    </div>
    <div class="t-group t-stroke-group">
      <button class="stroke-btn" data-stroke="0" title="thinnest">
        <svg viewBox="0 0 20 14"><line x1="2" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="0.8"/></svg>
      </button>
      <button class="stroke-btn" data-stroke="1" title="thin">
        <svg viewBox="0 0 20 14"><line x1="2" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="stroke-btn" data-stroke="2" title="default">
        <svg viewBox="0 0 20 14"><line x1="2" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="2.5"/></svg>
      </button>
      <button class="stroke-btn" data-stroke="3" title="thick">
        <svg viewBox="0 0 20 14"><line x1="2" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="4"/></svg>
      </button>
      <button class="stroke-btn" data-stroke="4" title="thickest">
        <svg viewBox="0 0 20 14"><line x1="2" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="5.5"/></svg>
      </button>
    </div>
    <div class="t-group t-text-group">
      <input
        type="number"
        class="size-input"
        id="sizeInput"
        min="8"
        max="500"
        step="1"
        value="32"
        title="font size (px)"
      />
      <span class="size-suffix">px</span>
    </div>
    <div class="t-group t-fill-group">
      <button class="fill-swatch" data-fill="none" title="no fill">
        <svg viewBox="0 0 22 22"><line x1="4" y1="18" x2="18" y2="4" stroke="#ff6464" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="fill-swatch" data-fill="#ff3b30" style="background:#ff3b30" title="red fill"></button>
      <button class="fill-swatch" data-fill="#ffcc00" style="background:#ffcc00" title="yellow fill"></button>
      <button class="fill-swatch" data-fill="#34c759" style="background:#34c759" title="green fill"></button>
      <button class="fill-swatch" data-fill="#0a84ff" style="background:#0a84ff" title="blue fill"></button>
      <button class="fill-swatch" data-fill="#ffffff" style="background:#ffffff" title="white fill"></button>
    </div>
  </div>

  <button class="save-btn hidden" id="saveBtn" title="save as">save</button>

  <canvas id="canvas" class="hidden"></canvas>

  <div class="help-bar hidden" id="helpBar">
    <span><kbd>drag</kbd>矩形</span>
    <span><kbd>dblclick</kbd>テキスト</span>
    <span><kbd data-other="Ctrl+C">⌘C</kbd>画像コピー</span>
  </div>

  <div class="toast" id="toast"></div>

  <div class="share-buttons">
    <button
      class="share-btn"
      id="shareTwitter"
      type="button"
      title="X (Twitter) で共有"
      aria-label="X (Twitter) で共有"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"
        />
      </svg>
    </button>
    <button
      class="share-btn"
      id="copyLink"
      type="button"
      title="リンクをコピー"
      aria-label="リンクをコピー"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
      </svg>
    </button>
  </div>

  <div class="privacy-note">
    全処理はブラウザで完結し、画像はサーバーへ送信されません
