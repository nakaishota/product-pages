<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" aria-label="管理コスト診断">
  <defs>
    <radialGradient id="kc-g1" cx="18%" cy="20%" r="62%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kc-g2" cx="88%" cy="14%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kc-g3" cx="84%" cy="92%" r="62%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kc-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5f5"/>
    </linearGradient>
  </defs>

  <rect width="480" height="300" fill="#171717"/>
  <rect width="480" height="300" fill="url(#kc-g1)"/>
  <rect width="480" height="300" fill="url(#kc-g2)"/>
  <rect width="480" height="300" fill="url(#kc-g3)"/>

  <!-- eyebrow(中央・安全域内) -->
  <text x="240" y="44" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12.5" letter-spacing="2.2" fill="#c7c7c7">MINIMALIST DIAGNOSIS</text>

  <!-- score gauge(中央) -->
  <g transform="translate(240 138)">
    <circle r="58" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="8"/>
    <circle r="58" fill="none" stroke="url(#kc-ring)" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="364.4" stroke-dashoffset="65.6" transform="rotate(-90)"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="-1" fill="#ffffff">82<tspan font-size="19" fill="#9a9a9a">%</tspan></text>
    <text x="0" y="26" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif" font-size="11" fill="#9a9a9a">ミニマリスト度</text>
  </g>

  <!-- title(中央下・安全域内) -->
  <text x="240" y="244" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="#ffffff">管理コスト診断</text>
  <text x="240" y="272" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif" font-size="13.5" font-weight="400" letter-spacing="1" fill="#bdbdbd">あなたのミニマリスト度を占う</text>
</svg>
